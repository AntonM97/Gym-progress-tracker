<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
:root {
	--bg-light: #e8f1f2;
	--bg-dark: #15171f;
	--text-light: #15171f;
	--text-dark: #e8f1f2;
	--primary-color: #ffbc03;
}

body {
	background-color: var(--bg-light);
	color: var(--text-light);
	transition: background-color 0.3s, color 0.3s;
}

body.dark-theme {
	background-color: var(--bg-dark);
	color: var(--text-dark);
}

.fixed-top-bar {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	z-index: 1000;
	background-color: var(--primary-color);
	padding: 10px;
	display: flex;
	justify-content: space-around;
}

.fixed-top-bar button {
	color: white;
	background-color: transparent;
	border: 2px solid white; /* Add border */
	border-radius: 5px; /* Rounded corners */
	padding: 8px 16px; /* Add padding */
	font-size: 16px;
	cursor: pointer; /* Change cursor to pointer */
	transition: background-color 0.3s, border-color 0.3s;
}

.main-content {
	margin-top: 60px; /* Offset for fixed top bar */
	padding: 20px;
}

.record-date {
	text-align: center;
	margin: 20px 0;
	font-size: 18px;
	font-weight: bold;
}

.record-item {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 10px;
	margin: 10px 0;
	background-color: rgba(255, 255, 255, 0.1);
	border-radius: 5px;
}

.record-item.dark-theme {
	background-color: rgba(0, 0, 0, 0.1);
}

.add-record-btn {
	position: fixed;
	bottom: 0;
	left: 0;
	right: 0;
	width: 100%;
	padding: 15px;
	background-color: var(--primary-color);
	color: white;
	border: none;
	font-size: 18px;
	text-align: center;
}

.add-record-btn:hover {
	background-color: #1481c2;
}

.edit-btn {
	color: var(--primary-color);
	background-color: transparent;
	border: none;
	font-size: 14px;
}
</style>
</head>
<body>
	<!-- Fixed Top Bar -->
	<div class="fixed-top-bar">
		<button>Records</button>
		<button>Stats</button>
		<button>:)</button>
		<button onclick="toggleTheme()">Theme</button>
	</div>

	<!-- Main Content -->
	<div class="main-content">
		<div th:each="entry : ${notesByDate}">

			<!-- Date header -->
			<div class="record-date" th:text="${entry.key}"></div>

			<!-- Notes under that date -->
			<div th:each="record : ${entry.value}" class="record-item">
				<span th:text="${record.notes}"></span>
				<button class="edit-btn">Edit</button>
			</div>

		</div>
	</div>

	<!-- Add Record Button -->
	<button class="add-record-btn" onclick="openAddRecordModal()">+</button>

	<!-- Add Record Modal (Hidden by Default) -->
	<div id="addRecordModal" style="display: none;">
		<textarea id="recordInput" placeholder="Enter your gym notes here..."
			style="width: 100%; height: 100px;"></textarea>
		<button onclick="saveRecord()">Save</button>
		<button onclick="closeAddRecordModal()">Cancel</button>
	</div>

	<!-- Theme Toggle Script -->
	<script>
    function toggleTheme() {
      document.body.classList.toggle('dark-theme');
    }

    function openAddRecordModal() {
      document.getElementById('addRecordModal').style.display = 'block';
    }

    function closeAddRecordModal() {
      document.getElementById('addRecordModal').style.display = 'none';
    }

    function saveRecord() {
      const recordText = document.getElementById('recordInput').value;
      if (recordText.trim() !== '') {
        // Add logic to save the record
        console.log('Record saved:', recordText);
        closeAddRecordModal();
      } else {
        alert('Please enter some text before saving.');
      }
    }
  </script>
</body>
</html>
